# Dependabot 版本更新設定
# 文件:https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # 更新 package.json / package-lock.json 的 npm 套件
  - package-ecosystem: "npm"
    directory: "/" # package.json 所在位置(專案根目錄)
    schedule:
      interval: "weekly" # 每週檢查一次
    open-pull-requests-limit: 10
    groups:
      # 把次要 / 修補版更新合併成一個 PR,減少 PR 數量
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"

  # 順便也更新 .github/workflows 裡 GitHub Actions 的版本
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
